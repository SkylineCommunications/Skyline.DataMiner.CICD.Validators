name: DataMiner CICD Solution

on:
  push:
    branches:
      - '**'
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-**"

  workflow_dispatch:

jobs:

  CICD:
    uses: SkylineCommunications/_ReusableWorkflows/.github/workflows/Master Workflow.yml@MasterWorkflow
    with:
      sonarcloud-project-name: SkylineCommunications_Skyline.DataMiner.CICD.Validators
      nuget-push-source: https://api.nuget.org/v3/index.json
      runs-on: windows-latest
      solution-filter-name: Skyline.DataMiner.CICD.Validators.sln
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGETAPIKEY }}
  
  export:
    if: github.ref_type == 'tag' && contains(github.ref_name, '-') == false
    needs: CICD
    name: Export Error Messages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      
      - name: Building
        run: dotnet build "./ExportErrorMessages/ExportErrorMessages.csproj" --configuration Release -nodeReuse:false

      - name: Run export logic
        run: | 
          ./ExportErrorMessages ${{ github.workspace }}/Protocol/ErrorMessages.xml ${{ github.ref_name }} ${{ github.workspace }}/TEMP
        working-directory: ${{ github.workspace }}/ExportErrorMessages/bin/Release/net8.0

      - name: Update release
        uses: ncipollo/release-action@v1.21.0
        with:
            name: Release v${{ github.ref_name }}
            allowUpdates: true
            artifacts: "${{ github.workspace }}/TEMP/Validator Error Messages - ${{ github.ref_name }}.xlsx"
            omitBodyDuringUpdate: true
